<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios - Actividad 3.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="form-header">
            <h2>Crear Cuenta</h2>
            <p>Completa el formulario para registrarte.</p>
        </div>

        <form id="registroForm" class="form" novalidate>
            <div class="form-control" id="grupo-username">
                <label for="username">Nombre de Usuario</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Ej: dev_senior">
                    <i class="fas fa-check-circle icon-success"></i>
                    <i class="fas fa-exclamation-circle icon-error"></i>
                </div>
                <small class="error-message">Mensaje de error aquí</small>
            </div>

            <div class="form-control" id="grupo-email">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">
                    <i class="fas fa-check-circle icon-success"></i>
                    <i class="fas fa-exclamation-circle icon-error"></i>
                </div>
                <small class="error-message">Mensaje de error aquí</small>
            </div>

            <div class="form-control" id="grupo-password">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres, 1 mayúscula, 1 número">
                    <i class="fas fa-check-circle icon-success"></i>
                    <i class="fas fa-exclamation-circle icon-error"></i>
                </div>
                <small class="error-message">Mensaje de error aquí</small>
            </div>

            <div class="form-control" id="grupo-confirmPassword">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repite tu contraseña">
                    <i class="fas fa-check-circle icon-success"></i>
                    <i class="fas fa-exclamation-circle icon-error"></i>
                </div>
                <small class="error-message">Mensaje de error aquí</small>
            </div>

            <button type="submit" id="btnSubmit" disabled>Registrarse</button>
        </form>
    </div>

    <script src="js/validaciones.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
